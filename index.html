<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cyber Attack Console</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:black;color:#00ff66;font-family:Consolas,monospace;overflow:hidden}
#matrix{position:fixed;inset:0;z-index:-1}
.container{padding:10px}
h1{font-size:18px;text-align:center;color:#00ffcc;text-shadow:0 0 10px #00ffcc;margin:6px 0}
.input{width:100%;padding:10px;background:#001a00;border:1px solid #00ff66;color:#00ff66;border-radius:8px}
.terminal{margin-top:8px;height:28vh;overflow-y:auto;background:#000;border:1px solid #00ff66;border-radius:10px;padding:8px;font-size:12px}
.progress{margin-top:8px;height:10px;background:#003300;border-radius:6px;overflow:hidden}
.bar{height:100%;width:0%;background:#00ff66}
.btn{width:100%;margin-top:8px;padding:12px;background:#00ff66;border:none;border-radius:10px;font-weight:bold}
.popup{position:absolute;width:70vw;max-width:300px;background:#001a00;border:1px solid #00ff66;border-radius:10px;box-shadow:0 0 15px #00ff66}
.header{display:flex;justify-content:space-between;align-items:center;padding:5px 8px;background:#002200;border-bottom:1px solid #00ff66;cursor:move}
.controls button{background:none;border:none;color:#00ff66;margin-left:6px}
.content{padding:6px;font-size:11px}
canvas{width:100%;height:80px}
.alert{position:fixed;top:10px;left:50%;transform:translateX(-50%);background:#330000;border:1px solid red;color:red;padding:8px;border-radius:8px;display:none;z-index:999}
</style>
</head>
<body>
<canvas id="matrix"></canvas>
<div class="alert" id="alert">⚠ SYSTEM TRACE DETECTED</div><div class="container">
<h1>⚡ CYBER ATTACK VERSION 1.0 ⚡</h1>
<input id="target" class="input" placeholder="ENTER TARGET DOMAIN">
<div class="terminal" id="terminal"></div>
<div class="progress"><div class="bar" id="bar"></div></div>
<button class="btn" onclick="startHack()">INITIATE</button>
</div><script>
/* MATRIX */
const canvas=document.getElementById("matrix"),ctx=canvas.getContext("2d")
canvas.width=innerWidth;canvas.height=innerHeight
let letters="01ABCDEFGHIJKLMNOPQRSTUVWXYZ"
let drops=Array(Math.floor(canvas.width/10)).fill(1)
setInterval(()=>{
ctx.fillStyle="rgba(0,0,0,0.05)";ctx.fillRect(0,0,canvas.width,canvas.height)
ctx.fillStyle="#00ff66";ctx.font="10px monospace"
drops.forEach((y,i)=>{
let t=letters[Math.floor(Math.random()*letters.length)]
ctx.fillText(t,i*10,y*10)
if(y*10>canvas.height&&Math.random()>0.975)drops[i]=0
drops[i]++
})
},50)

/* UTIL */
function r(){return Math.floor(Math.random()*255)}
function fakeIP(){return `${r()}.${r()}.${r()}.${r()}`}
function randPass(){return Math.random().toString(36).slice(2,12)}
const countries=["USA","RUSSIA","VIETNAM","CHINA","GERMANY","BRAZIL"]

/* POPUP */
function createPopup(type,x,y){
let content=""
if(type==="map") content="<canvas class='map'></canvas>"
if(type==="logs") content="LOGS<br>"+Math.random().toString(36)
if(type==="db") content="DB DUMP<br>admin: *****"
if(type==="graph") content="<canvas></canvas>"

let pop=document.createElement("div")
pop.className="popup"
pop.style.left=x+"px";pop.style.top=y+"px"
pop.innerHTML=`<div class='header'><span>${type.toUpperCase()}</span><div class='controls'><button onclick='min(this)'>_</button><button onclick='closePop(this)'>X</button></div></div><div class='content'>${content}</div>`

document.body.appendChild(pop)
drag(pop)

if(type==="graph") startGraph(pop.querySelector("canvas"))
if(type==="map") startMap(pop.querySelector("canvas.map"))
}

function min(btn){let c=btn.closest('.popup').querySelector('.content');c.style.display=c.style.display==='none'?'block':'none'}
function closePop(btn){btn.closest('.popup').remove()}

function drag(el){
let offX=0,offY=0,isDown=false
let head=el.querySelector('.header')
head.onmousedown=e=>{isDown=true;offX=e.clientX-el.offsetLeft;offY=e.clientY-el.offsetTop}
document.onmouseup=()=>isDown=false

document.onmousemove=e=>{
if(!isDown)return
el.style.left=(e.clientX-offX)+"px"
el.style.top=(e.clientY-offY)+"px"
}
}

/* GRAPH */
function startGraph(c){
let ctx=c.getContext("2d");c.width=250;c.height=80
let d=Array(40).fill(30)
setInterval(()=>{
d.push(Math.random()*60);d.shift()
ctx.clearRect(0,0,c.width,c.height)
ctx.beginPath();d.forEach((v,i)=>ctx.lineTo(i*6,80-v))
ctx.strokeStyle="#00ff66";ctx.stroke()
},200)
}

/* ADVANCED MAP */
function startMap(c){
let ctx=c.getContext("2d");c.width=250;c.height=80
let points=[]
for(let i=0;i<5;i++){
points.push({x:Math.random()*240+5,y:Math.random()*70+5,c:countries[Math.floor(Math.random()*countries.length)]})
}
let radar=0

setInterval(()=>{
ctx.clearRect(0,0,c.width,c.height)

// border
ctx.strokeStyle="#00ff66"
ctx.strokeRect(5,5,240,70)

// radar circle
ctx.beginPath()
ctx.arc(125,40,radar,0,Math.PI*2)
ctx.strokeStyle="rgba(0,255,102,0.3)"
ctx.stroke()
radar+=2
if(radar>120) radar=0

// draw lines
ctx.strokeStyle="#00ff66"
for(let i=0;i<points.length-1;i++){
ctx.beginPath()
ctx.moveTo(points[i].x,points[i].y)
ctx.lineTo(points[i+1].x,points[i+1].y)
ctx.stroke()
}

// draw points + labels
points.forEach(p=>{
ctx.beginPath()
ctx.arc(p.x,p.y,2,0,Math.PI*2)
ctx.fillStyle="#00ff66";ctx.fill()
ctx.font="8px monospace"
ctx.fillText(p.c,p.x+3,p.y+3)
})

},200)
}

/* MAIN */
const steps=["Reconnaissance","Scanning","Fuzzing","Exploitation","RCE","Web Shell","Data Exfiltration"]

function startHack(){
const term=document.getElementById('terminal')
const bar=document.getElementById('bar')
const target=document.getElementById('target').value||'unknown'
const alert=document.getElementById('alert')
term.innerHTML=""
let i=0,progress=0
setTimeout(()=>alert.style.display='block',4000)

const interval=setInterval(()=>{
if(progress<100){progress+=Math.random()*5;if(progress>100)progress=100;bar.style.width=progress+'%'}

if(i<steps.length){
let line=document.createElement('div')
line.textContent=`> [${target}] ${steps[i]}`
term.appendChild(line)
term.scrollTop=term.scrollHeight

let types=["logs","db","graph","map"]
createPopup(types[Math.floor(Math.random()*types.length)],Math.random()*innerWidth*0.6,Math.random()*innerHeight*0.6)

i++
}else{
clearInterval(interval)
let done=document.createElement('div')
done.innerHTML=`<br>✔ ACCESS GRANTED<br>IP: ${fakeIP()}<br>PASSWORD: ${randPass()}`
term.appendChild(done)
}
},700)
}
</script></body>
</html>
